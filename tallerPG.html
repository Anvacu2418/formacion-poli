<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto Expertos - Taller Posgrados</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        .bg-indigo-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 50%, #3730a3 100%);
        }

        .bg-gold-gradient {
            background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 100%);
        }

        .custom-shadow {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        /* Estilo para los cuadritos del decodificador */
        .sigla-box {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .sigla-box:hover {
            background-color: rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body class="bg-slate-50 antialiased text-slate-900">
    <div id="root"></div>

    <!-- React, ReactDOM y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configuración e inicialización de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBI4V4Ti-hV7dijrf3VsFJoPmqDsCKB9Rc",
            authDomain: "retoposgrados.firebaseapp.com",
            projectId: "retoposgrados",
            storageBucket: "retoposgrados.firebasestorage.app",
            messagingSenderId: "372209689262",
            appId: "1:372209689262:web:55ec0e7a764cfaf94d833f",
            measurementId: "G-X75LR3H3QS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // Exponemos las funciones necesarias para que el script de Babel las use
        // Se agregaron las funciones faltantes que causaban el error
        window.fb = { 
            db, auth, doc, setDoc, onSnapshot, collection, deleteDoc, getDocs, 
            signInAnonymously, onAuthStateChanged 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const appId = "taller-posgrados-experts-v2";

        const Icons = {
            Trophy: ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            ),
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Layout: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="3" rx="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
            Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
        };

        function App() {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState(null);
            const [expertName, setExpertName] = useState('');
            const [showNameInput, setShowNameInput] = useState(false);
            const [activeChallenge, setActiveChallenge] = useState(null);
            const [answers, setAnswers] = useState([]);
            const [studentInput, setStudentInput] = useState({ startDate: '', endDate: '', cohort: '' });
            const [hasSubmitted, setHasSubmitted] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const initFirebase = () => {
                    if (!window.fb) {
                        setTimeout(initFirebase, 100);
                        return;
                    }
                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    
                    signInAnonymously(auth).catch(e => console.error("Error Autenticación:", e));
                    
                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        setLoading(false);
                    });
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, doc, onSnapshot, collection } = window.fb;

                const challengeRef = doc(db, 'artifacts', appId, 'public', 'data', 'state', 'activeChallenge');
                const unsubChallenge = onSnapshot(challengeRef, (s) => {
                    if (s.exists()) { setActiveChallenge(s.data()); setHasSubmitted(false); }
                    else setActiveChallenge(null);
                });

                const answersRef = collection(db, 'artifacts', appId, 'public', 'data', 'answers');
                const unsubAnswers = onSnapshot(answersRef, (s) => {
                    const res = []; s.forEach(d => res.push({ id: d.id, ...d.data() }));
                    setAnswers(res);
                });
                return () => { unsubChallenge(); unsubAnswers(); };
            }, [user]);

            const ranking = useMemo(() => {
                return [...answers]
                    .filter(a => a.isCorrect && typeof a.responseTime === 'number')
                    .sort((a, b) => a.responseTime - b.responseTime)
                    .slice(0, 3);
            }, [answers]);

            const startChallenge = async (e) => {
                e.preventDefault();
                if (!user || !window.fb) return;
                const { db, doc, setDoc, collection, deleteDoc, getDocs } = window.fb;
                
                const fd = new FormData(e.target);
                const challenge = {
                    cedula: fd.get('cedula'),
                    correctStart: fd.get('correctStart'),
                    correctEnd: fd.get('correctEnd'),
                    correctCohort: fd.get('correctCohort').toString().trim().toUpperCase(),
                    timestamp: Date.now()
                };
                
                const answersRef = collection(db, 'artifacts', appId, 'public', 'data', 'answers');
                const oldDocs = await getDocs(answersRef);
                const deletePromises = oldDocs.docs.map(d => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'answers', d.id)));
                await Promise.all(deletePromises);

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'state', 'activeChallenge'), challenge);
            };

            const submitAnswer = async () => {
                if (!activeChallenge || !user || !window.fb) return;
                const { db, setDoc } = window.fb;
                
                const time = (Date.now() - activeChallenge.timestamp) / 1000;
                const isCorrect = studentInput.startDate === activeChallenge.correctStart &&
                                 studentInput.endDate === activeChallenge.correctEnd &&
                                 studentInput.cohort.trim().toUpperCase() === activeChallenge.correctCohort.trim().toUpperCase();

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'answers', user.uid), {
                    userName: expertName || "Experto",
                    ...studentInput, isCorrect, responseTime: time, submittedAt: Date.now()
                });
                setHasSubmitted(true);
            };

            const resetAll = async () => {
                if (!user || !window.fb) return;
                const { db, doc, deleteDoc, collection, getDocs } = window.fb;
                
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'state', 'activeChallenge'));
                const answersRef = collection(db, 'artifacts', appId, 'public', 'data', 'answers');
                const oldDocs = await getDocs(answersRef);
                const deletePromises = oldDocs.docs.map(d => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'answers', d.id)));
                await Promise.all(deletePromises);
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-indigo-gradient text-white font-bold uppercase text-[11px] tracking-[0.2em]">
                    Cargando Experiencia...
                </div>
            );

            if (!role) return (
                <div className="flex h-screen items-center justify-center bg-indigo-gradient p-4">
                    <div className="w-full max-w-sm bg-white rounded-[40px] shadow-2xl p-12 text-center animate-in fade-in zoom-in duration-500">
                        <div className="mb-6 flex justify-center text-yellow-500">
                            <Icons.Trophy className="w-16 h-16" />
                        </div>
                        <h1 className="text-3xl font-extrabold text-slate-800 mb-1 tracking-tighter uppercase">Reto Expertos</h1>
                        <p className="text-slate-400 mb-10 text-[10px] font-bold uppercase tracking-widest">Taller Posgrados</p>
                        
                        <div className={showNameInput ? 'hidden' : 'grid gap-4'}>
                            <button onClick={() => setRole('facilitator')} className="p-4 bg-slate-50 text-[#4338ca] rounded-2xl font-bold text-[11px] uppercase border-2 border-slate-100 hover:bg-slate-100 transition-all flex items-center justify-center gap-3 tracking-widest">
                                <Icons.User /> Facilitadora
                            </button>
                            <button onClick={() => setShowNameInput(true)} className="p-4 bg-[#4f46e5] text-white rounded-2xl font-bold text-[11px] uppercase shadow-lg hover:shadow-[#4338ca]/30 flex items-center justify-center gap-3 tracking-[0.15em] transition-all active:scale-95">
                                <Icons.Layout /> Equipo (Experto)
                            </button>
                        </div>

                        {showNameInput && (
                            <div className="space-y-6 animate-in slide-in-from-right-4 duration-300">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nombre Completo</label>
                                    <input 
                                        type="text" autoFocus placeholder="Escribe tu nombre"
                                        className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#4f46e5] text-center text-lg font-semibold text-slate-700"
                                        value={expertName} onChange={e => setExpertName(e.target.value)}
                                        onKeyPress={e => e.key === 'Enter' && setRole('expert')}
                                    />
                                </div>
                                <button onClick={() => setRole('expert')} disabled={expertName.length < 2} className="w-full bg-[#4f46e5] text-white p-4 rounded-2xl font-bold text-[11px] uppercase tracking-widest disabled:bg-slate-200 shadow-lg">
                                    Empezar ahora
                                </button>
                                <button onClick={() => setShowNameInput(false)} className="text-[10px] text-slate-400 uppercase font-bold tracking-widest block mx-auto hover:text-[#4f46e5]">Regresar</button>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 pb-10">
                    <header className="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-30 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="bg-[#4338ca] p-2 rounded-xl text-white shadow-md shadow-indigo-100"><Icons.Calendar /></div>
                            <div>
                                <h2 className="font-extrabold text-sm uppercase tracking-tight text-slate-800 leading-none">Taller Posgrados</h2>
                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Análisis Estratégico</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                             {role === 'expert' && <span className="text-[10px] font-bold text-slate-400 uppercase bg-slate-100 px-3 py-1 rounded-full">{expertName}</span>}
                             <button onClick={() => location.reload()} className="text-[10px] font-bold text-slate-400 hover:text-red-500 uppercase tracking-widest border border-slate-200 px-4 py-1.5 rounded-full transition-all">Salir</button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-8">
                        {/* DECODIFICADOR */}
                        <div className="lg:col-span-1 space-y-6">
                            <section className="bg-[#1e1b4b] text-white rounded-[32px] p-8 shadow-2xl relative overflow-hidden border-b-8 border-indigo-950/20">
                                <h3 className="text-[10px] font-bold mb-8 text-indigo-300 uppercase tracking-[0.2em] border-b border-white/5 pb-4">Decodificador</h3>
                                <div className="space-y-4">
                                    {[
                                        { label: 'PG', color: 'text-yellow-400', desc: 'Nivel Posgrado' },
                                        { label: 'V / P', color: 'text-blue-400', desc: 'Virtual / Presencial' },
                                        { label: '1S / 2S', color: 'text-green-400', desc: 'Semestre del Año' },
                                        { label: 'N / A', color: 'text-orange-400', desc: 'Nuevo / Antiguo' },
                                        { label: '1 / 2 / 3', color: 'text-pink-400', desc: 'Ingreso (Corte)' },
                                    ].map((item, i) => (
                                        <div key={i} className="flex items-center gap-5 p-4 sigla-box rounded-2xl group transition-all">
                                            <span className={`font-extrabold text-xl ${item.color} leading-none min-w-[70px] text-center`}>{item.label}</span>
                                            <span className="text-[12px] font-medium text-indigo-100 uppercase tracking-wide flex-1 leading-tight">{item.desc}</span>
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="mt-10 p-6 bg-gold-gradient rounded-3xl shadow-xl border-b-4 border-yellow-600 transition-transform hover:scale-[1.02] cursor-default">
                                    <h4 className="font-extrabold flex items-center gap-2 text-[10px] text-orange-950 mb-2 uppercase tracking-widest">
                                        <Icons.Clock /> REGLA DE ORO
                                    </h4>
                                    <p className="text-[12.5px] font-bold text-orange-950 leading-snug">
                                        Máximo <span className="underline decoration-2 font-black">2 SEMANAS ADICIONALES</span> después del inicio para reportar el pago.
                                    </p>
                                </div>
                            </section>
                        </div>

                        {/* ÁREA DE TRABAJO */}
                        <div className="lg:col-span-3 space-y-8">
                            {role === 'facilitator' ? (
                                <>
                                    {/* PODIO */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in slide-in-from-top-4">
                                        {ranking.length > 0 ? ranking.map((top, i) => (
                                            <div key={top.id} className={`p-6 bg-white rounded-[28px] border-2 flex items-center gap-5 transition-all ${i === 0 ? 'bg-yellow-50 border-yellow-200 scale-105 shadow-xl' : 'border-slate-100 shadow-sm'}`}>
                                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center font-bold text-lg ${i === 0 ? 'bg-yellow-400 text-yellow-900 shadow-md' : 'bg-slate-100 text-slate-400'}`}>{i + 1}</div>
                                                <div className="flex-1 overflow-hidden">
                                                    <p className="text-[9px] font-bold uppercase text-slate-400 tracking-widest">Estratega Pro</p>
                                                    <p className="font-extrabold text-sm text-slate-800 truncate uppercase mt-0.5">{top.userName}</p>
                                                    <p className="text-[#4338ca] font-bold text-[10px] mt-1">{top.responseTime.toFixed(2)}s</p>
                                                </div>
                                            </div>
                                        )) : <div className="md:col-span-3 p-10 bg-slate-50 border-2 border-dashed border-slate-200 rounded-[32px] text-center text-slate-400 text-xs font-bold uppercase tracking-[0.2em]">Esperando resultados correctos...</div>}
                                    </div>

                                    <section className="bg-white border border-slate-200 rounded-[32px] p-10 shadow-sm animate-in fade-in duration-500">
                                        <div className="flex justify-between items-center mb-8 border-b border-slate-50 pb-4">
                                            <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Lanzar nuevo desafío estratégico</h3>
                                            <button onClick={resetAll} className="text-[9px] text-red-400 font-bold uppercase tracking-widest hover:text-red-600 transition-colors border border-red-50 px-3 py-1 rounded-full">Limpiar Sesión</button>
                                        </div>
                                        <form onSubmit={startChallenge} className="space-y-8 text-slate-800">
                                            <div>
                                                <label className="text-[10px] font-extrabold text-slate-500 uppercase ml-4 mb-2 block tracking-widest">Cédula del Estudiante</label>
                                                <input name="cedula" required className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-[#4f46e5] font-bold text-xl tracking-tight transition-all shadow-inner" placeholder="Escribe el ID" />
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                <div>
                                                    <label className="text-[10px] font-extrabold text-slate-500 uppercase ml-4 mb-2 block tracking-widest">Fecha Inicio</label>
                                                    <input name="correctStart" type="date" required className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-[#4f46e5] font-bold transition-all shadow-inner" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-extrabold text-slate-500 uppercase ml-4 mb-2 block tracking-widest">Fecha Fin</label>
                                                    <input name="correctEnd" type="date" required className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-[#4f46e5] font-bold transition-all shadow-inner" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-extrabold text-slate-500 uppercase ml-4 mb-2 block tracking-widest">Corte Esperado (Analytics)</label>
                                                <input name="correctCohort" required className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-[#4f46e5] font-extrabold text-xl text-blue-600 uppercase tracking-tight transition-all shadow-inner" placeholder="EJ: PGV-1S-N-1" />
                                            </div>
                                            <button type="submit" className="w-full bg-[#4f46e5] text-white p-5 rounded-[28px] font-extrabold text-[11px] uppercase tracking-[0.2em] shadow-xl shadow-indigo-200 hover:bg-[#4338ca] transition-all active:scale-95">Publicar Desafío al Equipo</button>
                                        </form>
                                    </section>
                                </>
                            ) : (
                                /* VISTA DEL EXPERTO */
                                <div className="bg-white border-2 border-blue-100 rounded-[40px] p-12 shadow-2xl text-center min-h-[500px] flex items-center justify-center">
                                    {activeChallenge ? (
                                        hasSubmitted ? (
                                            <div className="animate-in fade-in zoom-in text-slate-800 text-center py-10 w-full">
                                                <div className="bg-green-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 text-green-600 shadow-inner">
                                                    <Icons.Check />
                                                </div>
                                                <h4 className="text-4xl font-extrabold tracking-tighter uppercase leading-none">Análisis Enviado</h4>
                                                <p className="text-slate-400 mt-6 text-sm font-bold uppercase tracking-widest">¡Mira tu posición en la pantalla principal!</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-12 text-left text-slate-800 w-full">
                                                <div className="flex items-center justify-between border-b border-slate-100 pb-10">
                                                    <div className="animate-in slide-in-from-left-4 duration-500">
                                                        <p className="text-blue-600 font-extrabold text-[11px] uppercase tracking-[0.3em] mb-2">ID Estudiante a Analizar</p>
                                                        <h3 className="text-6xl font-black text-slate-800 tracking-tighter leading-none">{activeChallenge.cedula}</h3>
                                                    </div>
                                                    <div className="text-slate-100 p-4 bg-slate-50 rounded-3xl"><Icons.Search /></div>
                                                </div>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                                    <div className="space-y-2">
                                                        <label className="text-[11px] font-extrabold text-slate-400 uppercase ml-4 tracking-widest">Inicio de Clases</label>
                                                        <input type="date" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[28px] font-semibold text-lg outline-none focus:border-[#4f46e5] transition-all shadow-inner" onChange={e => setStudentInput({...studentInput, startDate: e.target.value})} />
                                                    </div>
                                                    <div className="space-y-2">
                                                        <label className="text-[11px] font-extrabold text-slate-400 uppercase ml-4 tracking-widest">Fin de Clases</label>
                                                        <input type="date" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[28px] font-semibold text-lg outline-none focus:border-[#4f46e5] transition-all shadow-inner" onChange={e => setStudentInput({...studentInput, endDate: e.target.value})} />
                                                    </div>
                                                    <div className="col-span-2 space-y-2">
                                                        <label className="text-[11px] font-extrabold text-slate-400 uppercase ml-4 tracking-widest">Código Analytics (Completo)</label>
                                                        <input className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-[32px] font-extrabold text-3xl text-blue-700 outline-none focus:border-[#4f46e5] transition-all shadow-inner uppercase tracking-tight" placeholder="PGV-1S-N-1" onChange={e => setStudentInput({...studentInput, cohort: e.target.value})} />
                                                    </div>
                                                </div>
                                                <button onClick={submitAnswer} className="w-full bg-[#4f46e5] text-white p-8 rounded-[35px] font-extrabold text-xl uppercase tracking-widest shadow-2xl shadow-indigo-200 hover:bg-[#4338ca] transition-all active:scale-95">Subir Análisis Estratégico</button>
                                            </div>
                                        )
                                    ) : (
                                        <div className="py-20 italic text-slate-400 text-sm font-medium tracking-widest flex flex-col items-center gap-8 opacity-60">
                                            <div className="animate-pulse bg-slate-50 p-10 rounded-full shadow-inner"><Icons.Clock /></div>
                                            <p className="text-center uppercase leading-relaxed font-bold max-w-xs">Esperando el siguiente reto de la facilitadora...</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>
                    <footer className="mt-12 py-10 text-center border-t border-slate-100 bg-white shadow-inner">
