<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Poli-Jump: Kawaii Expert Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #002855; color: white;
            font-family: 'Poppins', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #main-wrapper {
            position: relative;
            width: 900px; height: 500px;
            max-width: 100vw; max-height: 100vh;
            border-radius: 20px;
            background: #5c94fc;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        #game-container { width: 100%; height: 100%; }

        #ui-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .glass-panel {
            background: rgba(0, 40, 85, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            pointer-events: auto;
        }

        .modal {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 450px;
            padding: 2rem; text-align: center;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .active-modal { display: flex !important; flex-direction: column; }

        .btn-poly {
            background: #fdb913;
            color: #002855; padding: 12px;
            border-radius: 10px; cursor: pointer;
            font-weight: 800; text-transform: uppercase;
            border: none; width: 100%; margin-top: 15px;
            box-shadow: 0 5px 0 #b3820d;
            transition: all 0.1s;
        }
        .btn-poly:active { transform: translateY(4px); box-shadow: 0 1px 0 #b3820d; }

        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .hud-stat {
            background: rgba(0, 75, 147, 0.6);
            backdrop-filter: blur(5px);
            padding: 8px 16px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.85rem; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }

        .quiz-opt {
            background: #004b93;
            border: 2px solid rgba(255,255,255,0.1);
            padding: 14px; margin: 10px 0;
            border-radius: 12px; cursor: pointer; text-align: left;
            transition: all 0.2s; font-size: 0.9rem; color: #fff;
        }
        .quiz-opt:hover { background: #00a859; border-color: #fff; transform: translateX(5px); }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <div id="game-container"></div>
        
        <div id="ui-overlay">
            <div id="hud">
                <div class="flex gap-3">
                    <div class="hud-stat">🪙 <span id="score-val">0</span></div>
                    <div class="hud-stat">❤️ <span id="lives-val">3</span></div>
                </div>
                <div class="flex gap-3">
                    <div class="hud-stat"><span id="booms-val">5</span> 💣 PENDIENTES</div>
                </div>
            </div>

            <div id="start-screen" class="modal glass-panel active-modal">
                <div class="mb-4">
                    <svg width="80" height="80" viewBox="0 0 40 40" style="margin: 0 auto;">
                        <circle cx="20" cy="22" r="16" fill="#00a859"/>
                        <circle cx="15" cy="18" r="4" fill="white"/><circle cx="25" cy="18" r="4" fill="white"/>
                        <circle cx="15" cy="18" r="1.5" fill="black"/><circle cx="25" cy="18" r="1.5" fill="black"/>
                        <rect x="10" y="8" width="20" height="4" rx="2" fill="#fdb913"/>
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-white mb-2">GEEKO <span class="text-yellow-400">JUMP</span></h1>
                <p class="text-xs text-gray-300 uppercase tracking-widest mb-6">Misión: Certificación de Analista</p>
                
                <div class="text-left bg-white/5 p-4 rounded-xl border border-white/10 mb-4">
                    <p class="text-[11px] leading-relaxed text-gray-200">
                        • ¡Usa las <b>NUBES MÓVILES</b> para subir!<br>
                        • Toca los bloques <span class="text-yellow-400 font-bold">?</span> para activar los retos.<br>
                        • ¡Doble salto disponible (pulsa salto en el aire)!
                    </p>
                </div>

                <button class="btn-poly" onclick="launchGame()">COMENZAR AVENTURA</button>
            </div>

            <div id="trivia-modal" class="modal glass-panel">
                <h2 id="trivia-title" class="text-lg font-black text-yellow-400 uppercase italic mb-2"></h2>
                <div class="h-1 w-20 bg-green-500 mx-auto mb-4 rounded-full"></div>
                <p id="trivia-q" class="font-semibold text-sm text-white mb-6 text-left leading-relaxed"></p>
                <div id="trivia-opts"></div>
                <button id="next-btn" class="btn-poly hidden" onclick="closeTrivia()">CONTINUAR</button>
            </div>

            <div id="end-screen" class="modal glass-panel">
                <div id="end-icon" class="text-5xl mb-4"></div>
                <h2 id="end-status" class="text-3xl font-black mb-2 uppercase italic"></h2>
                <p id="end-score" class="text-xl text-yellow-400 mb-6 font-bold"></p>
                <button class="btn-poly" onclick="location.reload()">VOLVER AL INICIO</button>
            </div>
        </div>
    </div>

    <script>
        let phaserGame;
        let gameState = { 
            score: 0, 
            lives: 3, 
            paused: false, 
            worldWidth: 3500,
            totalBooms: 5,
            boomsSolved: 0,
            jumpCount: 0
        };

        const content = [
            { t: "Amnistía EPV", q: "¿Cuál es el requisito indispensable para que un egresado aplique al programa 'Educación para la Vida'?", o: ["Haber cumplido el 100% de su plan de estudios", "No tener deudas financieras con el Poli"], a: 0 },
            { t: "Normativa Industrial", q: "¿Qué sucede con los estudiantes de Ing. Industrial (ingreso 2023-2+) que inscribieron cursos de profundización?", o: ["Se les permite terminar el curso", "Se les debe explicar el retiro y dar alternativas válidas"], a: 1 },
            { t: "Análisis Experto", q: "Si recibes una foto de un cheque físico por correo electrónico, ¿qué significa para el proceso de legalización?", o: ["El pago ya está en firme", "El cheque aún no ha sido entregado a la universidad"], a: 1 },
            { t: "Seguridad Digital", q: "Ante una alerta de Phishing que pide actualizar datos, ¿cuál es la instrucción oficial?", o: ["Ingresar al link solo si el correo parece del Poli", "Hacer caso omiso y cambiar clave en cpo.poligran.edu.co"], a: 1 },
            { t: "Alivios 2026-1", q: "¿Cuál es la única opción de apoyo disponible para estudiantes con dificultades financieras este periodo?", o: ["Retiro de 1 recargo por dificultades comprobadas", "Aplazamiento del semestre sin costo"], a: 0 }
        ];

        function launchGame() {
            document.getElementById('start-screen').classList.remove('active-modal');
            const config = {
                type: Phaser.AUTO,
                parent: 'game-container',
                width: 900, height: 500,
                backgroundColor: '#87CEEB',
                physics: { default: 'arcade', arcade: { gravity: { y: 1400 }, debug: false } },
                scene: { preload, create, update }
            };
            phaserGame = new Phaser.Game(config);
            window.focus();
        }

        function preload() {
            const g = this.make.graphics();
            
            // GEEKO KAWAII
            g.fillStyle(0x00a859).fillRoundedRect(0, 0, 32, 32, 10);
            g.fillStyle(0xfdb913).fillRoundedRect(4, 0, 24, 6, 2);
            g.fillStyle(0xffffff).fillCircle(10, 14, 5).fillCircle(22, 14, 5);
            g.fillStyle(0x000000).fillCircle(10, 14, 2).fillCircle(22, 14, 2);
            g.fillStyle(0xffaabb).fillCircle(6, 20, 3).fillCircle(26, 20, 3);
            g.generateTexture('geeko', 32, 32);

            // BLOQUE NORMAL
            g.clear().fillStyle(0x004b93).fillRoundedRect(0, 0, 40, 40, 4);
            g.lineStyle(2, 0xffffff, 0.2).strokeRoundedRect(1, 1, 38, 38, 4);
            g.generateTexture('block', 40, 40);

            // BLOQUE INTERROGACIÓN (?)
            g.clear().fillStyle(0xfdb913).fillRoundedRect(0, 0, 40, 40, 4);
            g.lineStyle(3, 0xffffff).strokeRoundedRect(2, 2, 36, 36, 4);
            g.lineStyle(4, 0x002855);
            g.beginPath();
            g.arc(20, 15, 6, -Math.PI, 0, false);
            g.lineTo(26, 15);
            g.lineTo(26, 18);
            g.lineTo(20, 22);
            g.lineTo(20, 26);
            g.strokePath();
            g.fillStyle(0x002855).fillCircle(20, 32, 3);
            g.generateTexture('q_block', 40, 40);

            // BLOQUE USADO
            g.clear().fillStyle(0x334155).fillRoundedRect(0, 0, 40, 40, 4);
            g.generateTexture('used_block', 40, 40);

            // MONEDA
            g.clear().fillStyle(0xfdb913).fillCircle(12, 12, 12);
            g.lineStyle(2, 0xffffff).strokeCircle(12, 12, 10);
            g.generateTexture('coin', 24, 24);

            // NUBE PLATAFORMA (Kawaii)
            g.clear().fillStyle(0xffffff).fillCircle(15, 15, 15).fillCircle(35, 15, 20).fillCircle(55, 15, 15);
            g.generateTexture('cloud_platform', 70, 35);

            // GOAL
            g.clear().lineStyle(8, 0x00a859).strokeRoundedRect(0, 0, 100, 150, 20);
            g.fillStyle(0x002855, 0.8).fillRoundedRect(0, 0, 100, 150, 20);
            g.generateTexture('goal', 100, 150);
        }

        let player, platforms, boomBlocks, coins, goal, cursors, movingClouds;

        function create() {
            this.physics.world.setBounds(0, 0, gameState.worldWidth, 500);
            this.cameras.main.setBounds(0, 0, gameState.worldWidth, 500);

            // Fondo Cielo
            this.add.rectangle(gameState.worldWidth/2, 250, gameState.worldWidth, 500, 0x5c94fc);
            for(let i=0; i<20; i++) {
                this.add.circle(Phaser.Math.Between(0, gameState.worldWidth), Phaser.Math.Between(50, 150), Phaser.Math.Between(30, 80), 0xffffff, 0.3);
            }

            platforms = this.physics.add.staticGroup();
            for(let x=0; x < gameState.worldWidth; x+=40) {
                platforms.create(x+20, 485, 'block').setScale(1, 0.8).refreshBody();
            }

            // Diseño de nivel estático
            const map = [
                [400, 350], [440, 350], [800, 350], [840, 350], [880, 350],
                [1400, 380], [1900, 380], [2450, 380]
            ];
            map.forEach(p => platforms.create(p[0], p[1], 'block'));

            // NUBES MÓVILES (Ayuda para NotiBooms)
            movingClouds = this.physics.add.group({ allowGravity: false, immovable: true });
            
            const cloudPaths = [
                {x: 550, y: 320, range: 100, horizontal: true},
                {x: 1100, y: 350, range: 120, horizontal: false},
                {x: 1650, y: 320, range: 100, horizontal: true},
                {x: 2150, y: 350, range: 120, horizontal: false},
                {x: 2800, y: 320, range: 100, horizontal: true}
            ];

            cloudPaths.forEach((path, i) => {
                let cloud = movingClouds.create(path.x, path.y, 'cloud_platform');
                this.tweens.add({
                    targets: cloud,
                    x: path.horizontal ? path.x + path.range : path.x,
                    y: path.horizontal ? path.y : path.y - path.range,
                    duration: 2000 + (i * 200),
                    ease: 'Sine.easeInOut',
                    yoyo: true,
                    repeat: -1
                });
            });

            player = this.physics.add.sprite(100, 400, 'geeko').setCollideWorldBounds(true);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            coins = this.physics.add.group({ key: 'coin', repeat: 60, setXY: { x: 300, y: 0, stepX: 55 } });
            coins.children.iterate(c => {
                c.setX(Phaser.Math.Between(200, 3300));
                c.setY(Phaser.Math.Between(100, 420));
                c.setBounceY(0.4);
            });

            // Bloques NotiBoom (Cerca de las nubes móviles)
            boomBlocks = this.physics.add.group({ immovable: true, allowGravity: false });
            const boomX = [550, 1100, 1650, 2150, 2800];
            boomX.forEach((x, i) => {
                let b = boomBlocks.create(x + 35, 180, 'q_block');
                b.setData('idx', i);
                b.setData('activated', false);
            });

            goal = this.physics.add.staticSprite(3400, 400, 'goal');

            // Colisiones y Overlaps
            this.physics.add.collider(player, platforms);
            this.physics.add.collider(player, movingClouds);
            this.physics.add.collider(coins, platforms);
            
            // Cambio importante: Activación por contacto simple
            this.physics.add.overlap(player, boomBlocks, handleBlockHit, null, this);
            
            this.physics.add.overlap(player, coins, (p, c) => { 
                c.disableBody(true, true); 
                gameState.score += 10; 
                updateHUD(); 
            }, null, this);
            
            this.physics.add.overlap(player, goal, checkWin, null, this);

            cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            if (gameState.paused) { player.setVelocityX(0); return; }

            if (cursors.left.isDown) { 
                player.setVelocityX(-320); 
                player.setFlipX(true); 
            } else if (cursors.right.isDown) { 
                player.setVelocityX(320); 
                player.setFlipX(false); 
            } else { 
                player.setVelocityX(0); 
            }

            // Salto y Doble Salto
            const didPressJump = Phaser.Input.Keyboard.JustDown(cursors.up) || 
                               Phaser.Input.Keyboard.JustDown(this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE));
            
            if (player.body.touching.down) {
                gameState.jumpCount = 0;
            }

            if (didPressJump) {
                if (player.body.touching.down) {
                    player.setVelocityY(-650);
                    gameState.jumpCount = 1;
                } else if (gameState.jumpCount < 2) {
                    player.setVelocityY(-600);
                    gameState.jumpCount = 2;
                }
            }
        }

        function updateHUD() {
            document.getElementById('score-val').innerText = gameState.score;
            document.getElementById('lives-val').innerText = gameState.lives;
            document.getElementById('booms-val').innerText = gameState.totalBooms - gameState.boomsSolved;
        }

        function handleBlockHit(p, b) {
            if (!b.getData('activated')) {
                gameState.paused = true;
                const idx = b.getData('idx');
                const data = content[idx];
                
                b.setTexture('used_block');
                b.setData('activated', true);
                
                // Efecto de rebote al tocar
                this.tweens.add({ targets: b, y: b.y - 15, duration: 100, yoyo: true });
                
                showTrivia(data);
            }
        }

        function showTrivia(data) {
            const modal = document.getElementById('trivia-modal');
            document.getElementById('trivia-title').innerText = data.t;
            document.getElementById('trivia-q').innerText = data.q;
            
            const opts = document.getElementById('trivia-opts');
            opts.innerHTML = '';
            data.o.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'quiz-opt';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (i === data.a) {
                        gameState.boomsSolved++;
                        gameState.score += 100;
                        document.getElementById('trivia-q').innerHTML = "<span class='text-green-400 font-bold'>¡CORRECTO! +100 Puntos.</span>";
                    } else {
                        gameState.lives--;
                        document.getElementById('trivia-q').innerHTML = "<span class='text-red-400 font-bold'>¡UPS! Repasa la normativa. Pierdes una vida.</span>";
                    }
                    updateHUD();
                    opts.innerHTML = '';
                    document.getElementById('next-btn').classList.remove('hidden');
                    if (gameState.lives <= 0) end(false);
                };
                opts.appendChild(btn);
            });
            modal.classList.add('active-modal');
        }

        function closeTrivia() {
            document.getElementById('trivia-modal').classList.remove('active-modal');
            document.getElementById('next-btn').classList.add('hidden');
            gameState.paused = false;
        }

        function checkWin() {
            if (gameState.boomsSolved >= gameState.totalBooms) {
                end(true);
            } else {
                player.setVelocityX(-500);
            }
        }

        function end(win) {
            gameState.paused = true;
            const modal = document.getElementById('end-screen');
            document.getElementById('end-icon').innerText = win ? "🎓" : "❌";
            document.getElementById('end-status').innerText = win ? "¡GRADUADO EXPERTO!" : "INTÉNTALO DE NUEVO";
            document.getElementById('end-score').innerText = `PUNTAJE: ${gameState.score}`;
            modal.classList.add('active-modal');
        }
    </script>
</body>
</html>
