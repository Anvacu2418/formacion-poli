<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoliPuntos - Formación</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PapaParse para leer datos exactos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        poliPurple: '#6B46C1', 
                        poliLight: '#FAF5FF',
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body { background-color: #f3f4f6; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        /* Transiciones suaves para las barras de métricas */
        .bar-chart { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Asegurar que el scroll interno sea sutil y elegante en PC */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Scroll horizontal invisible para los botones de meses si se agregan muchos */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<!-- Bloqueamos el scroll del body para evitar desplazar hacia abajo en PC -->
<body class="flex items-center justify-center h-screen w-screen overflow-hidden sm:p-4 md:p-8">

    <!-- Contenedor adaptativo: Móvil y Tablet (16:9) -->
    <div class="bg-white w-full h-full max-w-md sm:h-[90vh] md:max-w-none md:w-auto md:h-[85vh] md:aspect-video sm:shadow-2xl sm:rounded-[40px] md:rounded-[24px] overflow-hidden relative flex flex-col sm:border-8 md:border-[10px] sm:border-gray-900 transition-all duration-500 ease-in-out mx-auto">
        
        <div class="bg-poliPurple text-white pt-12 pb-6 px-6 md:px-10 rounded-b-[2rem] md:rounded-b-[2.5rem] shadow-lg z-10 relative">
            <h1 class="text-2xl md:text-3xl font-bold text-center tracking-wide"><i class="fa-solid fa-star text-yellow-300 mr-2"></i> PoliPuntos</h1>
            <p class="text-center text-purple-200 text-sm md:text-base mt-1 font-medium">Gestión y Seguimiento</p>
        </div>

        <!-- El scroll sucede SÓLO aquí adentro -->
        <div id="app-content" class="flex-1 p-6 md:p-10 md:px-16 overflow-y-auto custom-scrollbar bg-gray-50/50">
            <div class="flex flex-col justify-center items-center h-full text-center fade-in">
                <i class="fa-solid fa-circle-notch fa-spin text-5xl text-poliPurple mb-4"></i>
                <h2 class="text-lg md:text-xl font-bold text-gray-700">Conectando con la base...</h2>
                <p class="text-sm md:text-base text-gray-500 mt-2">Sincronizando datos en tiempo real</p>
            </div>
        </div>

        <!-- Navegación Inferior -->
        <div class="bg-white py-3 px-6 md:px-12 flex justify-around items-center border-t border-gray-100 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-10">
            <button id="nav-search" onclick="goHome()" class="flex flex-col items-center text-poliPurple transition-colors w-20 md:w-32">
                <i class="fa-solid fa-search text-xl md:text-2xl mb-1"></i>
                <span class="text-[10px] md:text-xs font-bold uppercase tracking-wider">Gestión</span>
            </button>
            <button id="nav-metrics" onclick="goToMetrics()" class="flex flex-col items-center text-gray-400 hover:text-poliPurple transition-colors w-20 md:w-32">
                <i class="fa-solid fa-chart-pie text-xl md:text-2xl mb-1"></i>
                <span class="text-[10px] md:text-xs font-bold uppercase tracking-wider">Métricas</span>
            </button>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DEL ENLACE Y PESTAÑAS (¡El poder modular!) ---
        const SHEET_ID = '1c6ft9uQQpXOJ0eu8b719jD6Q2ns5V8iy-yzfmLoaEvA';
        
        // ✨ AQUÍ ESTÁ LA MAGIA: Cuando lleguen los próximos meses, solo agrégalos a esta lista separados por comas.
        const MESES = ['Febrero', 'Marzo', 'Abril']; 
        
        let dataPorMes = {};
        MESES.forEach(mes => dataPorMes[mes] = []); // Preparamos los contenedores dinámicamente
        
        let currentStudentGlobal = null; 
        let activeMonthView = MESES[MESES.length - 1]; // Por defecto mostrará siempre el último mes de la lista
        
        const contentDiv = document.getElementById('app-content');

        // --- 2. DESCARGA MÚLTIPLE INTELIGENTE ---
        async function fetchGoogleSheetsData(isInitialLoad = true) {
            try {
                for (let mes of MESES) {
                    const fetchUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${mes}&nocache=${Date.now()}`;
                    
                    const response = await fetch(fetchUrl);
                    const csvText = await response.text();
                    
                    if (csvText.includes('<!DOCTYPE html>') || csvText.includes('<html')) {
                        throw new Error('DOCUMENTO_PRIVADO');
                    }

                    Papa.parse(csvText, {
                        header: false,
                        skipEmptyLines: true,
                        complete: function(results) {
                            const rows = results.data;
                            if(rows.length === 0) return;

                            const headers = rows[0].map((h, i) => h ? h.trim() : `Columna_Sin_Nombre_${i}`);
                            let estudiantesMes = [];
                            
                            for(let i = 1; i < rows.length; i++) {
                                let student = {};
                                let hasData = false;
                                rows[i].forEach((cell, index) => {
                                    let colName = headers[index];
                                    student[colName] = cell ? cell.trim() : null;
                                    if (cell && cell.trim() !== '') hasData = true;
                                });
                                if(hasData) estudiantesMes.push(student);
                            }
                            
                            dataPorMes[mes] = estudiantesMes;
                        }
                    });
                }

                console.log("Datos de todos los meses cargados:", dataPorMes);
                
                setTimeout(() => {
                    if (isInitialLoad) {
                        renderSearchScreen();
                    }
                }, 500);

            } catch (error) {
                console.error("Error al cargar:", error);
                let errorTitle = "No pudimos conectar";
                let errorDesc = `Asegúrate de que el documento sea público y que tengas las pestañas: ${MESES.join(', ')}.`;
                
                if (error.message === 'DOCUMENTO_PRIVADO') {
                    errorTitle = "Archivo Privado 🔒";
                    errorDesc = `Para que la app funcione, debes ir a tu Google Sheet, hacer clic en <b>Compartir</b> y cambiar el acceso a <b>"Cualquier usuario que tenga el vínculo"</b> (Lector).`;
                }

                contentDiv.innerHTML = `
                    <div class="fade-in flex flex-col items-center justify-center h-full text-center px-4">
                        <div class="w-20 h-20 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-3xl mb-4 shadow-sm">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <h2 class="text-xl font-bold text-gray-800 mb-2">${errorTitle}</h2>
                        <p class="text-sm text-gray-600 mb-6 bg-white p-4 rounded-xl border border-gray-100 shadow-sm">${errorDesc}</p>
                        <button onclick="fetchGoogleSheetsData()" class="px-6 py-2 bg-poliPurple text-white rounded-full font-semibold shadow-md hover:bg-purple-700 transition">
                            <i class="fa-solid fa-rotate-right mr-2"></i> Reintentar
                        </button>
                    </div>
                `;
            }
        }

        // --- 3. PANTALLA: BUSCADOR ---
        function renderSearchScreen(errorMsg = '') {
            updateNav('search');
            contentDiv.innerHTML = `
                <div class="fade-in space-y-6 md:space-y-8 max-w-4xl mx-auto">
                    <div class="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-100 p-5 md:p-8 rounded-2xl shadow-sm relative overflow-hidden">
                        <div class="absolute -right-4 -top-4 text-blue-100 opacity-50 text-6xl md:text-8xl">
                            <i class="fa-solid fa-bullseye"></i>
                        </div>
                        <div class="relative z-10 flex md:items-center">
                            <div class="mt-1 md:mt-0">
                                <i class="fa-solid fa-hand-wave text-2xl md:text-4xl text-yellow-500"></i>
                            </div>
                            <div class="ml-4 md:ml-6">
                                <h3 class="text-md md:text-xl font-bold text-blue-900">¡Hola Equipo!</h3>
                                <p class="text-sm md:text-base text-blue-800 mt-1 md:mt-2 leading-relaxed">
                                    Ingresa tu identificación para revisar tu gestión. Podrás ver tus detalles y métricas de evolución. ¡Tú tienes el control!
                                </p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-gray-100">
                        <label class="block text-sm md:text-base font-bold text-gray-700 mb-3 uppercase tracking-wide">Cédula</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-regular fa-id-card text-gray-400 text-lg md:text-xl"></i>
                            </div>
                            <input type="text" id="cedula-input" 
                                class="block w-full pl-12 pr-4 py-3.5 md:py-4 bg-gray-50 border-2 border-transparent rounded-xl focus:bg-white focus:ring-0 focus:border-poliPurple transition-all text-lg md:text-xl font-medium text-gray-800" 
                                placeholder="Ej. 1018419..."
                                onkeypress="handleKeyPress(event)">
                        </div>
                        ${errorMsg ? `<p class="text-red-500 text-sm md:text-base mt-3 font-medium flex items-center"><i class="fa-solid fa-circle-exclamation mr-2"></i> ${errorMsg}</p>` : ''}
                        
                        <button id="btn-consultar" onclick="searchStudent()" 
                            class="mt-5 md:mt-8 w-full flex justify-center items-center py-3.5 md:py-4 px-4 rounded-xl shadow-[0_4px_15px_rgba(107,70,193,0.3)] text-base md:text-lg font-bold text-white bg-poliPurple hover:bg-purple-700 hover:-translate-y-0.5 transition-all">
                            Consultar <i class="fa-solid fa-arrow-right ml-2"></i>
                        </button>
                    </div>

                    <div id="summary-container"></div>
                </div>
            `;
            
            if (currentStudentGlobal) {
                renderSummaryCard();
            } else {
                setTimeout(() => document.getElementById('cedula-input')?.focus(), 100);
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') searchStudent();
        }

        async function searchStudent() {
            const rawInput = document.getElementById('cedula-input').value.trim();
            if (!rawInput) return;
            
            const inputVal = rawInput.replace(/[^0-9a-z]/gi, '').toLowerCase();

            const btn = document.getElementById('btn-consultar');
            if (btn) {
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Buscando...';
                btn.disabled = true;
            }

            await fetchGoogleSheetsData(false);

            let foundStudent = { idOriginal: rawInput, data: {} };
            let foundAnywhere = false;

            for (let mes of MESES) {
                const idColumns = Object.keys(dataPorMes[mes][0] || {}).filter(k => {
                    let cleanKey = k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\./g, ' ');
                    const regex = /\b(cc|c c|id|cedula|login|documento|identificacion)\b/i;
                    return regex.test(cleanKey);
                });

                const studentInMonth = dataPorMes[mes].find(s => {
                    const keysToSearch = idColumns.length > 0 ? idColumns : Object.keys(s);
                    return keysToSearch.some(key => {
                        if (s[key] === null || s[key] === undefined) return false;
                        const cleanCell = String(s[key]).replace(/[^0-9a-z]/gi, '').toLowerCase();
                        return cleanCell === inputVal;
                    });
                });

                if (studentInMonth) {
                    foundStudent.data[mes] = studentInMonth;
                    foundAnywhere = true;
                }
            }

            if (foundAnywhere) {
                currentStudentGlobal = foundStudent;
                
                // Determina el mes más reciente disponible para este estudiante
                activeMonthView = MESES[MESES.length - 1]; // Intenta con el último
                for(let i = MESES.length - 1; i >= 0; i--) {
                    if (foundStudent.data[MESES[i]]) {
                        activeMonthView = MESES[i];
                        break;
                    }
                }
                
                renderSummaryCard();
            } else {
                currentStudentGlobal = null;
                renderSearchScreen("No encontramos ese registro. Verifica el número e intenta de nuevo.");
                document.getElementById('cedula-input').value = rawInput; 
            }
        }

        function findColumn(student, keywords) {
            if(!student) return null;
            const key = Object.keys(student).find(k => 
                keywords.some(word => k.toLowerCase().includes(word))
            );
            return key ? student[key] : null;
        }

        // --- 5. TARJETA DE RESUMEN ---
        function renderSummaryCard() {
            if(!currentStudentGlobal) return;
            const summaryContainer = document.getElementById('summary-container');
            if(!summaryContainer) return;
            
            // Busca la data del mes activo, si no, toma la primera disponible
            let studentMes = currentStudentGlobal.data[activeMonthView];
            if(!studentMes) {
                 studentMes = Object.values(currentStudentGlobal.data)[0];
            }
            
            const nombre = findColumn(studentMes, ['nombre', 'asesor', 'estudiante']) || 'Asesor';
            const meta = findColumn(studentMes, ['meta', 'estado', 'resultado']) || 'Ver detalle';
            const idMostrar = findColumn(studentMes, ['cedula', 'cc', 'documento', 'login', 'id']) || currentStudentGlobal.idOriginal;

            const esPositivo = String(meta).toLowerCase().includes('logra') || String(meta).toLowerCase().includes('cumple') || String(meta).toLowerCase().includes('activo');
            const badgeClass = esPositivo ? 'bg-green-100 text-green-700 border-green-200' : 'bg-orange-100 text-orange-700 border-orange-200';
            const iconClass = esPositivo ? 'fa-check-double' : 'fa-bolt';

            summaryContainer.innerHTML = `
                <div class="mt-6 md:mt-8 bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden fade-in cursor-pointer transform transition-transform hover:-translate-y-1 hover:shadow-xl" onclick="renderDetailsScreen()">
                    <div class="bg-gray-50 px-5 md:px-8 py-3 md:py-4 border-b border-gray-100 flex justify-between items-center group">
                        <span class="text-xs md:text-sm font-bold text-gray-500 uppercase tracking-wider group-hover:text-poliPurple transition-colors">Ver Detalles de ${activeMonthView}</span>
                        <i class="fa-solid fa-chevron-right text-gray-400 group-hover:text-poliPurple transition-colors"></i>
                    </div>
                    <div class="p-5 md:p-8">
                        <div class="flex items-center">
                            <div class="h-14 w-14 md:h-20 md:w-20 rounded-full bg-poliPurple flex items-center justify-center text-white text-2xl md:text-3xl font-bold shadow-inner border-2 md:border-4 border-purple-200 flex-shrink-0">
                                ${nombre.charAt(0).toUpperCase()}
                            </div>
                            <div class="ml-4 md:ml-6 flex-1">
                                <h3 class="text-lg md:text-xl font-bold text-gray-900 leading-tight">${nombre}</h3>
                                <p class="text-sm md:text-base text-gray-500 mt-0.5 font-medium"><i class="fa-regular fa-id-badge mr-1"></i> ${idMostrar}</p>
                                
                                <div class="mt-3 md:mt-4 inline-flex items-center px-3 md:px-4 py-1 md:py-1.5 rounded-lg border text-xs md:text-sm font-bold uppercase tracking-wide ${badgeClass}">
                                    <i class="fa-solid ${iconClass} mr-2"></i> ${meta}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            const btn = document.getElementById('btn-consultar');
            if (btn) {
                btn.innerHTML = 'Consultar <i class="fa-solid fa-arrow-right ml-2"></i>';
                btn.disabled = false;
            }
        }

        // --- 6. PANTALLA: DETALLES ---
        function renderDetailsScreen() {
            if (!currentStudentGlobal) return;
            updateNav('search');
            
            const studentMes = currentStudentGlobal.data[activeMonthView];
            if (!studentMes) {
                contentDiv.innerHTML = `<div class="p-6 text-center text-gray-500">No hay datos registrados para el mes de ${activeMonthView}. <button onclick="goHome()" class="text-poliPurple font-bold block mt-4">Volver</button></div>`;
                return;
            }

            const nombre = findColumn(studentMes, ['nombre', 'asesor', 'estudiante']) || 'Asesor';
            const meta = findColumn(studentMes, ['meta', 'estado', 'resultado']);
            
            const hideKeywords = ['nombre', 'asesor', 'cedula', 'cc', 'login', 'documento', 'meta', 'estado'].concat(MESES.map(m => m.toLowerCase()));
            
            let activitiesHTML = '';
            Object.keys(studentMes).forEach(key => {
                const isHidden = hideKeywords.some(word => key.toLowerCase().includes(word));
                if (!isHidden && studentMes[key] !== null && studentMes[key] !== '' && !key.toLowerCase().includes('total puntos')) {
                    activitiesHTML += `
                        <div class="flex justify-between items-center py-3.5 md:py-4 border-b border-gray-50 last:border-0 hover:bg-gray-50 px-2 md:px-4 rounded-lg transition-colors">
                            <span class="text-gray-600 font-medium text-sm md:text-base">${key}</span>
                            <span class="bg-purple-50 border border-purple-100 text-poliPurple font-bold py-1 px-3 md:px-4 rounded-lg text-sm md:text-base">${studentMes[key]}</span>
                        </div>
                    `;
                }
            });

            const necesitaEsfuerzo = String(meta).toLowerCase().includes('falta') || String(meta).toLowerCase().includes('no');
            
            let messageHTML = '';
            if (necesitaEsfuerzo) {
                messageHTML = `
                    <div class="bg-orange-50 border border-orange-200 p-5 md:p-6 rounded-2xl shadow-sm mt-6 md:mt-8 relative overflow-hidden">
                        <div class="absolute -right-2 -top-2 opacity-10 text-6xl text-orange-500"><i class="fa-solid fa-lightbulb"></i></div>
                        <h3 class="text-base md:text-lg font-bold text-orange-800 flex items-center mb-2">
                            <i class="fa-solid fa-compass text-orange-500 mr-2 text-lg"></i> Oportunidad de Mejora
                        </h3>
                        <p class="text-sm md:text-base text-orange-700 leading-relaxed">
                            Recuerda que siempre puedes mejorar y ponerte al día con las actividades. Revisa tus métricas, confía en tus habilidades y organiza tu gestión. ¡Tú puedes lograrlo!
                        </p>
                    </div>
                `;
            } else {
                messageHTML = `
                    <div class="bg-emerald-50 border border-emerald-200 p-5 md:p-6 rounded-2xl shadow-sm mt-6 md:mt-8 relative overflow-hidden">
                        <div class="absolute -right-2 -top-2 opacity-10 text-6xl text-emerald-500"><i class="fa-solid fa-gem"></i></div>
                        <h3 class="text-base md:text-lg font-bold text-emerald-800 flex items-center mb-2">
                            <i class="fa-solid fa-medal text-emerald-500 mr-2 text-lg"></i> ¡Buen trabajo!
                        </h3>
                        <p class="text-sm md:text-base text-emerald-700 leading-relaxed">
                            ¡Felicidades! Vas por un buen camino, sigue así. Has demostrado estar al día con todo.
                        </p>
                    </div>
                `;
            }

            // CREACIÓN DINÁMICA DE LOS BOTONES DE MESES
            let tabsHTML = '<div class="flex p-1 bg-gray-200/50 rounded-xl mb-6 md:mb-8 overflow-x-auto no-scrollbar">';
            MESES.forEach(mes => {
                const hasData = currentStudentGlobal.data[mes] ? true : false;
                const isActive = activeMonthView === mes;
                tabsHTML += `
                    <button onclick="switchMonth('${mes}')" 
                        class="flex-1 min-w-[80px] py-2 md:py-3 text-sm md:text-base font-bold rounded-lg transition-all mx-0.5 ${isActive ? 'bg-white text-poliPurple shadow-sm' : 'text-gray-500 hover:text-gray-700'} ${!hasData ? 'opacity-30 cursor-not-allowed' : ''}" 
                        ${!hasData ? 'disabled' : ''}>
                        ${mes}
                    </button>
                `;
            });
            tabsHTML += '</div>';

            contentDiv.innerHTML = `
                <div class="fade-in pb-8 max-w-4xl mx-auto">
                    <button onclick="goHome()" class="flex items-center text-gray-400 hover:text-poliPurple font-bold text-sm md:text-base uppercase tracking-wider mb-5 transition-colors group">
                        <span class="bg-white rounded-full w-8 h-8 md:w-10 md:h-10 flex items-center justify-center shadow-sm border border-gray-100 mr-2 group-hover:border-poliPurple transition-colors">
                            <i class="fa-solid fa-arrow-left"></i>
                        </span> 
                        Volver
                    </button>

                    ${tabsHTML}

                    <div class="bg-gradient-to-br from-poliPurple to-purple-800 text-white rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 shadow-lg mb-6 md:mb-8 relative overflow-hidden">
                        <div class="absolute -top-12 -right-12 w-40 h-40 bg-white opacity-10 rounded-full blur-xl"></div>
                        <div class="relative z-10 flex flex-col items-center">
                            <h2 class="text-2xl md:text-3xl font-bold text-center leading-tight mb-1">${nombre}</h2>
                            ${meta ? `
                            <div class="mt-4 md:mt-6 bg-black/20 backdrop-blur-md rounded-2xl md:rounded-3xl py-3 px-8 md:px-10 border border-white/20 text-center shadow-inner">
                                <p class="text-[10px] md:text-xs text-purple-200 uppercase tracking-widest mb-1 font-bold">Estado Actual (${activeMonthView})</p>
                                <p class="text-xl md:text-2xl font-bold text-white drop-shadow-md">${meta}</p>
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <div class="px-2">
                        <h3 class="text-gray-800 font-bold text-base md:text-lg mb-3 flex items-center uppercase tracking-wide">
                            <i class="fa-solid fa-chart-simple text-poliPurple mr-2"></i> Desglose de Gestión
                        </h3>
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-3 md:p-5">
                            ${activitiesHTML || '<p class="text-center text-gray-400 py-6 text-sm md:text-base font-medium">No hay detalles registrados aún.</p>'}
                        </div>
                    </div>

                    ${messageHTML}
                    
                </div>
            `;
        }

        // --- 7. PANTALLA: MÉTRICAS (Evolución Histórica Automática) ---
        function goToMetrics() {
            updateNav('metrics');
            
            if (!currentStudentGlobal) {
                contentDiv.innerHTML = `
                    <div class="fade-in flex flex-col items-center justify-center h-full text-center px-4 pt-10">
                        <div class="w-24 h-24 bg-purple-50 text-poliPurple rounded-full flex items-center justify-center text-4xl mb-6 shadow-sm border-4 border-white outline outline-1 outline-purple-100">
                            <i class="fa-solid fa-chart-line"></i>
                        </div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-2">Sección de Métricas</h2>
                        <p class="text-sm md:text-base text-gray-500 mb-6 bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 max-w-md mx-auto">Para ver tu gráfica de evolución histórica, primero debes consultar tu número de identificación en la pestaña de Gestión.</p>
                        <button onclick="goHome()" class="px-6 py-2.5 md:py-3 md:px-8 bg-poliPurple text-white rounded-full font-bold shadow-md hover:bg-purple-700 transition md:text-lg">
                            Ir a Buscar <i class="fa-solid fa-search ml-2"></i>
                        </button>
                    </div>
                `;
                return;
            }

            // LÓGICA INTELIGENTE: Comparar los dos últimos meses de la lista de forma automática
            const mesActualNombre = MESES[MESES.length - 1]; // Ej: Abril
            const mesAnteriorNombre = MESES[MESES.length - 2]; // Ej: Marzo

            const studentAnterior = currentStudentGlobal.data[mesAnteriorNombre];
            const studentActual = currentStudentGlobal.data[mesActualNombre];
            
            // Si no existe data en el mes actual pero sí en uno anterior, ajustamos para que la persona vea la persona
            const dataBase = studentActual || studentAnterior || Object.values(currentStudentGlobal.data)[0];
            const nombre = findColumn(dataBase, ['nombre', 'asesor', 'estudiante']) || 'Asesor';

            let ptsAnterior = studentAnterior ? (parseInt(String(findColumn(studentAnterior, ['total', 'puntos'])).replace(/\D/g,'')) || 0) : 0;
            let ptsActual = studentActual ? (parseInt(String(findColumn(studentActual, ['total', 'puntos'])).replace(/\D/g,'')) || 0) : 0;

            const MAX_PTS = Math.max(350, ptsAnterior, ptsActual); 
            const pctAnterior = Math.min(100, Math.max(5, (ptsAnterior / MAX_PTS) * 100)); 
            const pctActual = Math.min(100, Math.max(5, (ptsActual / MAX_PTS) * 100));

            const crecimiento = ptsActual - ptsAnterior;
            let mensajeEvolucion = "";
            let iconoEvolucion = "";
            let colorEvolucion = "";

            if (ptsAnterior > 0 && ptsActual > 0) {
                if (crecimiento > 0) {
                    mensajeEvolucion = `¡Has mejorado tus puntos en comparación a ${mesAnteriorNombre.toLowerCase()}! Incrementaste <b>${crecimiento} pts</b>.`;
                    iconoEvolucion = "fa-arrow-trend-up";
                    colorEvolucion = "text-emerald-500 bg-emerald-50";
                } else if (crecimiento < 0) {
                    mensajeEvolucion = `Tienes <b>${Math.abs(crecimiento)} pts menos</b> que en ${mesAnteriorNombre.toLowerCase()}. ¡Aún estás a tiempo de subir esos números!`;
                    iconoEvolucion = "fa-arrow-trend-down";
                    colorEvolucion = "text-orange-500 bg-orange-50";
                } else {
                    mensajeEvolucion = `Te mantuviste exactamente igual que en ${mesAnteriorNombre.toLowerCase()}. ¡Vamos por más!`;
                    iconoEvolucion = "fa-equals";
                    colorEvolucion = "text-blue-500 bg-blue-50";
                }
            } else if (ptsActual > 0 && ptsAnterior === 0) {
                 mensajeEvolucion = `Comenzaste fuerte en ${mesActualNombre}. ¡Sigue construyendo tu puntaje!`;
                 iconoEvolucion = "fa-rocket";
                 colorEvolucion = "text-poliPurple bg-purple-50";
            }

            contentDiv.innerHTML = `
                <div class="fade-in pb-8 max-w-4xl mx-auto">
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-1">Tu Evolución</h2>
                    <p class="text-sm md:text-base text-gray-500 mb-6 md:mb-8"><i class="fa-regular fa-user mr-1"></i> ${nombre}</p>

                    <!-- Tarjeta de Gráfica -->
                    <div class="bg-white p-5 md:p-10 rounded-2xl shadow-sm border border-gray-100 mb-6 md:mb-8">
                        <h3 class="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-wider mb-5 md:mb-8">Comparativo de Puntos</h3>
                        
                        <!-- Barra Mes Anterior -->
                        <div class="mb-5 md:mb-8">
                            <div class="flex justify-between items-end mb-1 md:mb-2">
                                <span class="text-sm md:text-lg font-bold text-gray-600">${mesAnteriorNombre}</span>
                                <span class="text-sm md:text-lg font-bold text-gray-800">${ptsAnterior} <span class="text-xs md:text-sm font-normal text-gray-400">pts</span></span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-3 md:h-5">
                                <div class="bg-gray-400 h-3 md:h-5 rounded-full bar-chart" style="width: 0%" data-target="${pctAnterior}%"></div>
                            </div>
                        </div>

                        <!-- Barra Mes Actual -->
                        <div>
                            <div class="flex justify-between items-end mb-1 md:mb-2">
                                <span class="text-sm md:text-lg font-bold text-poliPurple">${mesActualNombre}</span>
                                <span class="text-sm md:text-lg font-bold text-poliPurple">${ptsActual} <span class="text-xs md:text-sm font-normal opacity-70">pts</span></span>
                            </div>
                            <div class="w-full bg-purple-100 rounded-full h-3 md:h-5 shadow-inner">
                                <div class="bg-poliPurple h-3 md:h-5 rounded-full relative bar-chart" style="width: 0%" data-target="${pctActual}%">
                                    <div class="absolute right-0 top-0 bottom-0 w-2 md:w-3 bg-white opacity-30 rounded-full"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Tarjeta de Insight (Conclusiones) -->
                    ${mensajeEvolucion ? `
                    <div class="p-4 md:p-6 rounded-2xl flex items-start border ${colorEvolucion.replace('text-', 'border-').replace('bg-', 'border-opacity-20 bg-')}">
                        <div class="mt-1 mr-3 md:mr-4 text-xl md:text-3xl ${colorEvolucion.split(' ')[0]}">
                            <i class="fa-solid ${iconoEvolucion}"></i>
                        </div>
                        <p class="text-sm md:text-lg text-gray-700 leading-relaxed md:pt-1">${mensajeEvolucion}</p>
                    </div>
                    ` : ''}
                </div>
            `;

            setTimeout(() => {
                document.querySelectorAll('.bar-chart').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-target');
                });
            }, 100);
        }

        // --- UTILIDADES ---
        function goHome() {
            renderSearchScreen();
        }

        function switchMonth(mes) {
            if(currentStudentGlobal && currentStudentGlobal.data[mes]) {
                activeMonthView = mes;
                renderDetailsScreen();
            }
        }

        function updateNav(activeTab) {
            const searchBtn = document.getElementById('nav-search');
            const metricsBtn = document.getElementById('nav-metrics');
            
            if (activeTab === 'search') {
                searchBtn.className = "flex flex-col items-center text-poliPurple transition-colors w-20 md:w-32";
                metricsBtn.className = "flex flex-col items-center text-gray-400 hover:text-poliPurple transition-colors w-20 md:w-32";
            } else {
                metricsBtn.className = "flex flex-col items-center text-poliPurple transition-colors w-20 md:w-32";
                searchBtn.className = "flex flex-col items-center text-gray-400 hover:text-poliPurple transition-colors w-20 md:w-32";
            }
        }

        window.onload = () => {
            fetchGoogleSheetsData();
        };
    </script>
</body>
</html>
